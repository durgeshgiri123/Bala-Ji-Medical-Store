<!doctype html><html lang="en" data-theme="light"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Customers | Bala Ji Medical Store</title><link rel="icon" href="assets/logo.svg" type="image/svg+xml"><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link href="css/style.css" rel="stylesheet"></head><body data-page="customers" data-roles="Admin,Manager,Employee">
<div class="app-shell"><aside class="sidebar"><a class="sidebar-brand" href="admin.html"><img src="assets/logo.svg" alt="Logo"> <span>BJ Medical</span></a><nav class="nav flex-column"><a class="nav-link" href="admin.html" data-role-link="Admin">Dashboard</a><a class="nav-link" href="inventory.html">Inventory</a><a class="nav-link" href="billing.html">Billing</a><a class="nav-link" href="employees.html" data-role-link="Admin">Employees</a><a class="nav-link active" href="customers.html">Customers</a><a class="nav-link" href="prescriptions.html">Prescriptions</a><button class="nav-link btn btn-link text-start" data-action="logout">Logout</button></nav></aside><div class="content-area"><nav class="navbar bg-body-tertiary shadow-sm px-3"><span class="fw-semibold">Customer Management</span><span data-current-user class="small text-muted"></span></nav>
<main class="container-fluid p-3 p-md-4"><div id="notificationArea"></div><section class="row g-3"><div class="col-lg-4"><div class="card border-0 shadow-sm"><div class="card-header bg-transparent fw-semibold">Add / Edit Customer</div><div class="card-body"><form id="customerForm"><input type="hidden" name="CustomerID"><input type="hidden" name="csrf" data-csrf><div class="mb-3"><label class="form-label">Name</label><input name="Name" class="form-control" required></div><div class="mb-3"><label class="form-label">Phone</label><input name="Phone" class="form-control" pattern="[0-9]{10}" required></div><div class="mb-3"><label class="form-label">Email</label><input name="Email" type="email" class="form-control"></div><div class="mb-3"><label class="form-label">Address</label><textarea name="Address" class="form-control"></textarea></div><button class="btn btn-primary">Save Customer</button><button class="btn btn-outline-secondary" type="reset">Clear</button></form></div></div></div><div class="col-lg-8"><div class="card border-0 shadow-sm"><div class="card-header bg-transparent d-flex justify-content-between"><strong>Customers</strong><input id="customerSearch" class="form-control form-control-sm w-auto" placeholder="Search customer"></div><div class="card-body table-responsive"><table class="table table-hover"><thead><tr><th>ID</th><th>Name</th><th>Phone</th><th>Email</th><th>Address</th><th>Date Added</th><th>Action</th></tr></thead><tbody id="customersTable"></tbody></table></div></div></div></section></main></div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script><script src="js/app.js"></script></body></html>
