<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Staff Login | Bala Ji Medical Store</title><link rel="icon" href="assets/logo.svg" type="image/svg+xml">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link href="css/style.css" rel="stylesheet">
</head>
<body data-page="login" class="auth-body">
<main class="container min-vh-100 d-flex align-items-center justify-content-center py-5">
  <div class="auth-card card border-0 shadow-lg">
    <div class="card-body p-4 p-md-5">
      <div class="text-center mb-4"><img src="assets/logo.svg" class="login-logo" alt="Bala Ji Medical Store logo"><h1 class="h3 fw-bold mt-3">Staff Login</h1><p class="text-muted">Secure access for Admin, Manager, and Employee roles.</p></div>
      <div id="notificationArea"></div>
      <form id="loginForm" novalidate>
        <input type="hidden" name="csrf" data-csrf>
        <div class="mb-3"><label class="form-label" for="username">Username</label><input id="username" name="username" class="form-control" autocomplete="username" required minlength="3"></div>
        <div class="mb-3"><label class="form-label" for="password">Password</label><input id="password" name="password" type="password" class="form-control" autocomplete="current-password" required minlength="6"></div>
        <button class="btn btn-primary w-100" type="submit">Login</button>
      </form>
      <div class="d-flex justify-content-between mt-3 small"><a href="index.html">Public inventory</a><button class="btn btn-link p-0 small" data-action="toggle-theme">Toggle dark mode</button></div>
    </div>
  </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script><script src="js/app.js"></script>
</body></html>
