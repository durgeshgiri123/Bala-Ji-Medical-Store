<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Bala Ji Medical Store</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="login-page">

  <div id="toast-container"></div>
  <div id="loading-overlay" class="hidden">
    <div class="spinner"></div>
    <div class="loading-text">Signing in…</div>
  </div>

  <div class="login-card">
    <div class="login-logo">
      <div class="logo-icon">💊</div>
      <h1>Bala Ji Medical Store</h1>
      <p>Lakhimpur, Uttar Pradesh — Staff Portal</p>
    </div>

    <form id="login-form" novalidate>
      <div class="form-group">
        <label class="form-label" for="login-email">Email Address <span class="required">*</span></label>
        <input type="email" id="login-email" class="form-control" placeholder="you@balaji.com" autocomplete="email" required>
      </div>

      <div class="form-group">
        <label class="form-label" for="login-password">Password <span class="required">*</span></label>
        <div style="position:relative">
          <input type="password" id="login-password" class="form-control" placeholder="••••••••" autocomplete="current-password" required style="padding-right:40px">
          <button type="button" id="toggle-password" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px">👁️</button>
        </div>
      </div>

      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
        <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer;color:var(--text-secondary)">
          <input type="checkbox" id="remember-me" style="accent-color:var(--primary)"> Remember me
        </label>
        <a href="#" id="forgot-link" style="font-size:13px;color:var(--primary);text-decoration:none">Forgot password?</a>
      </div>

      <button type="submit" id="login-submit" class="btn btn-primary w-100 btn-lg">🔐 Sign In</button>
    </form>

    <!-- Demo credentials (remove in production) -->
    <div style="margin-top:20px;padding:12px;background:var(--bg);border-radius:var(--radius-sm);font-size:12px;color:var(--text-muted)">
      <strong style="color:var(--text-secondary)">Demo credentials:</strong><br>
      <div style="display:flex;gap:6px;margin-top:6px;flex-wrap:wrap">
        <button id="demo-admin" class="btn btn-sm btn-ghost" style="font-size:11px">👑 Admin</button>
        <button id="demo-emp"   class="btn btn-sm btn-ghost" style="font-size:11px">👤 Employee</button>
      </div>
    </div>

    <p style="text-align:center;margin-top:16px;font-size:12px;color:var(--text-muted)">
      Public users? <a href="index.html" style="color:var(--primary);text-decoration:none">View medicine catalogue →</a>
    </p>
  </div>

  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
