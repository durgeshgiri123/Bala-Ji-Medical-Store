<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reports — Bala Ji Medical Store</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <script src="js/app.js"></script>
</head>
<body>
  <script>document.write(getLoadingHTML());</script>
  <div class="app-wrapper">
    <script>document.write(getSidebarHTML('reports.html'));</script>
    <main class="main-content">
      <script>document.write(getTopbarHTML('Reports'));</script>
      <div class="page-body">
        <div class="page-header"><div><h1>📊 Reports & Analytics</h1><p>Admin-only daily, weekly, monthly, medicine usage, and stock added reports.</p></div><div style="display:flex;gap:8px"><button id="btn-export-pdf" class="btn btn-outline-primary">📄 Export PDF</button><button id="btn-export-excel" class="btn btn-success">📗 Export Excel</button></div></div>
        <div class="card mb-4"><div class="card-body"><div class="report-tabs"><button class="report-tab active" data-tab="daily">Daily</button><button class="report-tab" data-tab="weekly">Weekly</button><button class="report-tab" data-tab="monthly">Monthly</button><button class="report-tab" data-tab="medicine">Medicine Usage</button><button class="report-tab" data-tab="stock">Stock Added</button></div><div class="row g-3 mt-2"><div class="col-md-3"><label class="form-label">From</label><input id="rpt-from" type="date" class="form-control"></div><div class="col-md-3"><label class="form-label">To</label><input id="rpt-to" type="date" class="form-control"></div></div></div></div>
        <div id="rpt-summary" class="stat-cards"></div>
        <div class="card mb-4"><div class="card-header"><div class="card-title">Visual Summary</div></div><div class="card-body"><div id="rpt-chart" class="chart-wrap"></div></div></div>
        <div class="card"><div class="card-header"><div class="card-title">Report Details</div></div><div class="table-responsive"><table><tbody id="rpt-tbody"></tbody></table></div></div>
      </div>
    </main>
  </div>
  <script src="js/reports.js"></script>
</body>
</html>
