<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Employees — Bala Ji Medical Store</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <script src="js/app.js"></script>
</head>
<body>
  <script>document.write(getLoadingHTML());</script>
  <div class="app-wrapper">
    <script>document.write(getSidebarHTML('employees.html'));</script>
    <main class="main-content">
      <script>document.write(getTopbarHTML('Employees'));</script>
      <div class="page-body">
        <div class="page-header"><div><h1>👥 Employee Management</h1><p>Admin-only staff directory with role and active/inactive controls.</p></div><button id="btn-add-employee" class="btn btn-primary">➕ Add Employee</button></div>
        <div class="stat-cards"><div class="stat-card"><div class="stat-icon green">👥</div><div class="stat-info"><div class="stat-value" id="stat-total-emp">0</div><div class="stat-label">Total Employees</div></div></div><div class="stat-card"><div class="stat-icon blue">✅</div><div class="stat-info"><div class="stat-value" id="stat-active-emp">0</div><div class="stat-label">Active Employees</div></div></div><div class="stat-card"><div class="stat-icon red">⛔</div><div class="stat-info"><div class="stat-value" id="stat-inactive-emp">0</div><div class="stat-label">Inactive Employees</div></div></div></div>
        <div class="card"><div class="card-header"><div class="card-title">Staff List</div><div class="filter-bar" style="margin:0"><div class="search-wrap"><span class="si">🔍</span><input id="emp-search" class="form-control" placeholder="Search employees..."></div><select id="emp-role-filter" class="form-select"><option value="">All Roles</option></select><select id="emp-status-filter" class="form-select"><option value="">All Status</option><option>Active</option><option>Inactive</option></select></div></div><div class="table-responsive"><table><thead><tr><th>Name</th><th>Role</th><th>Mobile</th><th>Email</th><th>Joining Date</th><th>Status</th><th>Actions</th></tr></thead><tbody id="emp-tbody"></tbody></table></div><div id="emp-pagination" class="card-body"></div></div>
      </div>
    </main>
  </div>
  <div id="employee-modal" class="modal-overlay"><div class="modal modal-lg"><form id="employee-form"><div class="modal-header"><h3 id="emp-modal-title" class="modal-title">Add Employee</h3><button type="button" class="modal-close" onclick="document.getElementById('employee-modal').classList.remove('active')">×</button></div><div class="modal-body"><input type="hidden" id="emp-id-field"><div class="row g-3"><div class="col-md-6"><label class="form-label">Full Name <span class="required">*</span></label><input id="emp-name" class="form-control" required></div><div class="col-md-6"><label class="form-label">Mobile Number <span class="required">*</span></label><input id="emp-phone" class="form-control" maxlength="10" required></div><div class="col-md-6"><label class="form-label">Email <span class="required">*</span></label><input id="emp-email" type="email" class="form-control" required></div><div class="col-md-6"><label class="form-label">Joining Date</label><input id="emp-joining" type="date" class="form-control"></div><div class="col-md-6"><label class="form-label">Role</label><select id="emp-role" class="form-select"></select></div><div class="col-md-6"><label class="form-label">Password</label><input id="emp-password" type="password" class="form-control" placeholder="Required for new staff"></div><div class="col-12"><label class="form-label">Address</label><textarea id="emp-address" class="form-control" rows="2"></textarea></div></div></div><div class="modal-footer"><button type="button" class="btn btn-ghost" onclick="document.getElementById('employee-modal').classList.remove('active')">Cancel</button><button type="submit" class="btn btn-primary">Save Employee</button></div></form></div></div>
  <script src="js/employees.js"></script>
</body>
</html>
