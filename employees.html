<!doctype html><html lang="en" data-theme="light"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Employees | Bala Ji Medical Store</title><link rel="icon" href="assets/logo.svg" type="image/svg+xml"><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link href="css/style.css" rel="stylesheet"></head><body data-page="employees" data-roles="Admin">
<div class="app-shell"><aside class="sidebar"><a class="sidebar-brand" href="admin.html"><img src="assets/logo.svg" alt="Logo"> <span>BJ Medical</span></a><nav class="nav flex-column"><a class="nav-link" href="admin.html">Dashboard</a><a class="nav-link" href="inventory.html">Inventory</a><a class="nav-link" href="billing.html">Billing</a><a class="nav-link active" href="employees.html">Employees</a><a class="nav-link" href="customers.html">Customers</a><button class="nav-link btn btn-link text-start" data-action="logout">Logout</button></nav></aside><div class="content-area"><nav class="navbar bg-body-tertiary shadow-sm px-3"><span class="fw-semibold">Employee Management</span><span data-current-user class="small text-muted"></span></nav>
<main class="container-fluid p-3 p-md-4"><div id="notificationArea"></div><section class="row g-3"><div class="col-lg-4"><div class="card border-0 shadow-sm"><div class="card-header bg-transparent fw-semibold">Add / Edit Employee</div><div class="card-body"><form id="employeeForm"><input type="hidden" name="EmployeeID"><input type="hidden" name="csrf" data-csrf><div class="mb-2"><label class="form-label">Name</label><input name="Name" class="form-control" required></div><div class="mb-2"><label class="form-label">Username</label><input name="Username" class="form-control" required></div><div class="mb-2"><label class="form-label">Password</label><input name="Password" type="password" class="form-control" minlength="6" placeholder="Required for new employee"></div><div class="mb-2"><label class="form-label">Role</label><select name="Role" class="form-select"><option>Employee</option><option>Manager</option><option>Admin</option></select></div><div class="mb-2"><label class="form-label">Phone</label><input name="Phone" class="form-control"></div><div class="mb-2"><label class="form-label">Email</label><input name="Email" type="email" class="form-control"></div><div class="mb-3"><label class="form-label">Status</label><select name="Status" class="form-select"><option>Active</option><option>Inactive</option></select></div><button class="btn btn-primary">Save Employee</button><button class="btn btn-outline-secondary" type="reset">Clear</button></form></div></div></div><div class="col-lg-8"><div class="card border-0 shadow-sm"><div class="card-header bg-transparent d-flex justify-content-between"><strong>Employee List</strong><input id="employeeSearch" class="form-control form-control-sm w-auto" placeholder="Search"></div><div class="card-body table-responsive"><table class="table table-hover"><thead><tr><th>ID</th><th>Name</th><th>Role</th><th>Phone</th><th>Email</th><th>Status</th><th>Actions</th></tr></thead><tbody id="employeesTable"></tbody></table></div></div></div></section></main></div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script><script src="js/app.js"></script></body></html>
