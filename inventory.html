<!doctype html><html lang="en" data-theme="light"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Inventory | Bala Ji Medical Store</title><link rel="icon" href="assets/logo.svg" type="image/svg+xml"><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link href="css/style.css" rel="stylesheet"></head><body data-page="inventory" data-roles="Admin,Manager,Employee">
<div class="app-shell"><aside class="sidebar"><a class="sidebar-brand" href="admin.html"><img src="assets/logo.svg" alt="Logo"> <span>BJ Medical</span></a><nav class="nav flex-column"><a class="nav-link" href="admin.html" data-role-link="Admin">Dashboard</a><a class="nav-link active" href="inventory.html">Inventory</a><a class="nav-link" href="billing.html">Billing</a><a class="nav-link" href="employees.html" data-role-link="Admin">Employees</a><a class="nav-link" href="customers.html">Customers</a><a class="nav-link" href="prescriptions.html">Prescriptions</a><button class="nav-link btn btn-link text-start" data-action="logout">Logout</button></nav></aside><div class="content-area"><nav class="navbar bg-body-tertiary shadow-sm px-3"><span class="fw-semibold">Inventory Management</span><span data-current-user class="small text-muted"></span></nav>
<main class="container-fluid p-3 p-md-4"><div id="notificationArea"></div><section class="row g-3"><div class="col-lg-5"><div class="card border-0 shadow-sm"><div class="card-header bg-transparent fw-semibold">Add / Edit Medicine</div><div class="card-body"><form id="medicineForm"><input type="hidden" name="MedicineID"><input type="hidden" name="csrf" data-csrf><div class="mb-3"><label class="form-label">Medicine Name</label><input name="MedicineName" class="form-control" required></div><div class="mb-3"><label class="form-label">Category</label><input name="Category" list="categoryOptions" class="form-control" required><datalist id="categoryOptions"></datalist></div><div class="mb-3"><label class="form-label">Remarks</label><textarea name="Remarks" class="form-control"></textarea></div><div class="form-check mb-3" data-role-link="Admin"><input class="form-check-input" type="checkbox" name="AllowDuplicateMedicine" id="allowDuplicateMedicine"><label class="form-check-label" for="allowDuplicateMedicine">Allow Duplicate Medicine (Admin only)</label></div><button class="btn btn-primary">Save Medicine</button><button type="reset" class="btn btn-outline-secondary">Clear</button></form></div></div></div><div class="col-lg-7"><div class="card border-0 shadow-sm"><div class="card-header bg-transparent fw-semibold">Incoming Stock Entry</div><div class="card-body"><form id="stockForm" class="row g-3"><input type="hidden" name="csrf" data-csrf><div class="col-md-6"><label class="form-label">Medicine</label><select name="MedicineID" id="stockMedicineSelect" class="form-select" required></select></div><div class="col-md-3"><label class="form-label">Quantity Received</label><input name="QuantityAdded" type="number" min="1" class="form-control" required></div><div class="col-md-3"><label class="form-label">Date</label><input name="Date" type="date" class="form-control" required></div><div class="col-12"><label class="form-label">Remarks</label><input name="Remarks" class="form-control"></div><div class="col-12"><button class="btn btn-success">Add Stock</button></div></form></div></div></div></section><section class="card border-0 shadow-sm mt-4"><div class="card-header bg-transparent d-flex flex-wrap gap-2 justify-content-between"><strong>Medicine List</strong><div class="d-flex gap-2"><input id="inventorySearch" class="form-control form-control-sm" placeholder="Search"><button class="btn btn-outline-success btn-sm" id="exportInventoryCsv">Export CSV</button></div></div><div class="card-body table-responsive"><table class="table table-hover align-middle"><thead><tr><th>ID</th><th>Name</th><th>Category</th><th>Quantity</th><th>Updated</th><th>Remarks</th><th>Action</th></tr></thead><tbody id="inventoryTable"></tbody></table></div></section></main></div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script><script src="js/app.js"></script></body></html>
