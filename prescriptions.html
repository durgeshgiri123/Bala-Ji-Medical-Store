<!doctype html><html lang="en" data-theme="light"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Prescriptions | Bala Ji Medical Store</title><link rel="icon" href="assets/logo.svg" type="image/svg+xml"><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link href="css/style.css" rel="stylesheet"></head><body data-page="prescriptions" data-roles="Admin,Doctor">
